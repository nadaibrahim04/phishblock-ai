<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishBlock AI - Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Fixed background path to a foolproof relative asset link -->
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center relative bg-cover bg-center bg-no-repeat" 
      style="background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), url('/static/ui_background.png');">

    <!-- Notification Engine Area -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="absolute top-6 left-1/2 -translate-x-1/2 w-full max-w-md px-4 z-50">
                {% for category, message in messages %}
                    <div class="p-4 rounded-xl border shadow-xl flex items-center justify-between {% if category == 'success' %}bg-emerald-950/90 border-emerald-500/40 text-emerald-400{% else %}bg-red-950/90 border-red-500/40 text-red-400{% endif %} backdrop-blur-sm">
                        <span class="text-sm font-medium">{{ message }}</span>
                        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-white ml-3 text-xs">✕</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="w-full max-w-md px-4">
        <div class="bg-slate-800/90 border border-slate-700/80 rounded-2xl shadow-2xl p-8 backdrop-blur-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-sky-400 tracking-tight">PhishBlock AI</h1>
                <p class="text-slate-400 text-sm mt-1">AI-Based Phishing Detection System</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
                <div>
                    <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" id="email" name="email" class="w-full p-3 bg-slate-900/90 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-sky-500 transition-colors" placeholder="Enter Your Email" required>
                </div>
                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" name="password" class="w-full p-3 bg-slate-900/90 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-sky-500 transition-colors" placeholder="Enter Your Password" required>
                </div>
                <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold p-3.5 rounded-xl transition-colors shadow-lg shadow-sky-950/50 mt-2">Log In</button>
            </form>

            <div class="mt-6 text-center text-sm border-t border-slate-700/60 pt-5">
                <span class="text-slate-400">New to PhishBlock AI?</span>
                <a href="{{ url_for('signup') }}" class="text-sky-400 hover:text-sky-300 font-semibold ml-1">Sign Up </a>
            </div>
        </div>
    </div>

</body>
</html>
